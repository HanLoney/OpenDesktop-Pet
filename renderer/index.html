<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>OpenDesktopPet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --fs: 13px;
      --bar: 28px;
      --theme: #5B8CFF;
      --theme2: #5B8CFF;
      --theme-gradient: linear-gradient(135deg, #5B8CFF, #5B8CFF);
      --theme-light: #AFCBFF;
      --theme-bg: #EAF2FF;
      --theme-dark: #3a6ee8;
      --theme-shadow: rgba(91,140,255,0.4);
      --theme-shadow-soft: rgba(91,140,255,0.18);
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    }

    /* =========================================================
       Live2D / 图片 渲染层
    ========================================================= */
    #live2d-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    #live2d-layer canvas {
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: all;
    }
    #custom-pet-image {
      display: none;
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      pointer-events: none;
      z-index: 2;
      transform-origin: center bottom;
      background: transparent;
    }

    /* =========================================================
       UI 叠加层
    ========================================================= */
    #ui-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ─── 聊天气泡 ─────────────────────────────────────────── */
    #chat-bubble {
      position: absolute;
      padding: 14px 16px 18px;
      border-radius: 18px;
      background: #ffffff;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 2px solid var(--theme-light);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      color: #333;
      font-size: var(--fs);
      line-height: 1.6;
      display: none;
      word-break: break-word;
      pointer-events: none;
      z-index: 10;
    }
    #chat-bubble::after {
      content: "";
      position: absolute;
      left: -8px;
      bottom: 22px;
      width: 12px;
      height: 12px;
      background: #ffffff;
      border-left: 2px solid var(--theme-light);
      border-bottom: 2px solid var(--theme-light);
      transform: rotate(45deg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    #chat-bubble.visible {
      display: block;
      animation: bubbleIn 0.25s ease-out;
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(10px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .bubble-content {
      word-break: break-word;
      max-height: 140px;
      overflow-y: auto;
    }
    .bubble-content::-webkit-scrollbar { width: 3px; }
    .bubble-content::-webkit-scrollbar-thumb { background: var(--theme-shadow); border-radius: 2px; }
    @media (prefers-color-scheme: dark) {
      #chat-bubble { background: #1e1e28; color: #eee; border-color: var(--theme); }
      #chat-bubble::after { background: #1e1e28; border-left-color: var(--theme); border-bottom-color: var(--theme); }
    }


    /* ─── 窗口拖动手柄 ─────────────────────────────────────── */
    #window-drag-handle {
      position: absolute;
      top: 6px;
      left: 6px;
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: #ffffff;
      border: 2px solid var(--theme-light);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: move;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s, border-color 0.2s;
      pointer-events: none;
    }
    #window-drag-handle.visible { opacity: 1; pointer-events: all; }
    #window-drag-handle:hover { background: var(--theme-bg); border-color: var(--theme); }
    #window-drag-handle svg { width: 13px; height: 13px; }
    #window-drag-handle svg path { fill: var(--theme); }

    /* ─── 窗口缩放按钮 ─────────────────────────────────────── */
    .window-zoom-btn {
      position: absolute;
      left: 6px;
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: #ffffff;
      border: 2px solid var(--theme-light);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s, border-color 0.2s;
      pointer-events: none;
      color: var(--theme);
      font-size: 16px;
      font-weight: 600;
      line-height: 1;
      user-select: none;
      padding: 0;
      font-family: inherit;
    }
    .window-zoom-btn.visible { opacity: 1; pointer-events: all; }
    .window-zoom-btn:hover { background: var(--theme-bg); border-color: var(--theme); }
    .window-zoom-btn:disabled { opacity: 0.35 !important; cursor: not-allowed; }
    #window-zoom-in  { top: 38px; }
    #window-zoom-out { top: 70px; }

    #window-scale-label {
      position: absolute;
      left: 38px;
      top: 44px;
      font-size: 11px;
      color: var(--theme);
      background: #ffffff;
      border: 1px solid var(--theme-light);
      border-radius: 6px;
      padding: 1px 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 21;
      white-space: nowrap;
    }
    #window-scale-label.visible { opacity: 1; }

    /* ─── 底部聊天输入区 ───────────────────────────────────── */
    #chat-area {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6px 10px;
      display: flex;
      gap: 5px;
      align-items: center;
      background: transparent;
      pointer-events: all;
      z-index: 15;
    }
    #chat-input {
      flex: 1;
      min-width: 0;
      height: var(--bar);
      border: 2px solid var(--theme-light);
      border-radius: calc(var(--bar) / 2);
      padding: 0 14px;
      background: #ffffff;
      color: #333;
      font-size: calc(var(--bar) * 0.46);
      outline: none;
      transition: border-color 0.2s;
    }
    #chat-input::placeholder { color: #9bb6dc; }
    #chat-input:focus { border-color: var(--theme); }

    #send-btn, #settings-btn, #screenshot-btn, #ai-toggle-btn {
      width: var(--bar); height: var(--bar);
      border: 2px solid var(--theme-light);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    #send-btn:active, #settings-btn:active, #screenshot-btn:active, #ai-toggle-btn:active {
      transform: scale(0.94);
    }
    #send-btn svg, #settings-btn svg, #screenshot-btn svg, #ai-toggle-btn svg {
      width: calc(var(--bar) * 0.57);
      height: calc(var(--bar) * 0.57);
    }
    #send-btn svg path { fill: #ffffff; }
    #settings-btn svg path, #screenshot-btn svg path { fill: var(--theme); }

    #send-btn {
      background: var(--theme-gradient);
      border-color: var(--theme);
    }
    #send-btn:hover { background: var(--theme-dark); border-color: var(--theme-dark); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #settings-btn, #screenshot-btn { background: #ffffff; }
    #settings-btn:hover, #screenshot-btn:hover { background: var(--theme-bg); border-color: var(--theme); }
    #screenshot-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #settings-btn svg path, #screenshot-btn svg path { fill: var(--theme); }

    #ai-toggle-btn { background: #ffffff; border-color: var(--theme-light); }
    #ai-toggle-btn svg path { fill: var(--theme); }
    #ai-toggle-btn:hover { background: var(--theme-bg); border-color: var(--theme); }
    #ai-toggle-btn.ai-off { background: #f5f5f5; border-color: #ccc; }
    #ai-toggle-btn.ai-off svg path { fill: #bbb; }
    #ai-toggle-btn.ai-off:hover { background: #ececec; border-color: #aaa; }

    /* ─── 自定义确认弹窗 ───────────────────────────────────── */
    #custom-confirm-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.18);
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      pointer-events: all;
    }
    #custom-confirm-mask.visible { display: flex; }
    #custom-confirm-box {
      background: #fff; border: 2px solid var(--theme-light);
      border-radius: 18px; box-shadow: 0 8px 32px var(--theme-shadow-soft);
      padding: 24px 24px 18px; min-width: 220px; max-width: 280px;
      display: flex; flex-direction: column; gap: 16px;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    }
    #custom-confirm-msg { color: #333; font-size: var(--fs); line-height: 1.6; text-align: center; }
    #custom-confirm-btns { display: flex; gap: 10px; justify-content: center; }
    #custom-confirm-btns button {
      flex: 1; padding: 7px 0; border-radius: 10px;
      border: 2px solid var(--theme-light); font-size: var(--fs);
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    #custom-confirm-ok { background: var(--theme-gradient); color: #fff; border-color: var(--theme) !important; }
    #custom-confirm-ok:hover { opacity: 0.85; }
    #custom-confirm-cancel { background: #fff; color: var(--theme); }
    #custom-confirm-cancel:hover { background: var(--theme-bg); border-color: var(--theme) !important; }
  </style>
</head>
<body>

  <!-- 层 1：Live2D / 图片 渲染层 -->
  <div id="live2d-layer">
    <img id="custom-pet-image" src="" alt="">
  </div>

  <!-- 层 2：UI 叠加层 -->
  <div id="ui-layer">

    <!-- 聊天气泡 -->
    <div id="chat-bubble">
      <div class="bubble-content" id="bubble-content"></div>
    </div>

    <!-- 窗口控制：拖拽手柄、缩放按钮 -->
    <div id="window-drag-handle" title="拖动移动窗口">

    </div>
    <button id="window-zoom-in"  class="window-zoom-btn" title="放大窗口">+</button>
    <button id="window-zoom-out" class="window-zoom-btn" title="缩小窗口">−</button>
    <div id="window-scale-label"></div>

    <!-- 底部聊天输入区 -->
    <div id="chat-area">
      <input type="text" id="chat-input" placeholder="说点什么吧..." autocomplete="off">

    </div>

    <!-- 自定义确认弹窗 -->
    <div id="custom-confirm-mask">
      <div id="custom-confirm-box">
        <div id="custom-confirm-msg"></div>
        <div id="custom-confirm-btns">
          <button id="custom-confirm-cancel">取消</button>
          <button id="custom-confirm-ok">确定</button>
        </div>
      </div>
    </div>

  </div><!-- /ui-layer -->

  <script src="../libs/live2dcubismcore.min.js"></script>
  <script src="../libs/pixi.min.js"></script>
  <script src="../libs/cubism4.min.js"></script>
  <script src="./pet-controller.js"></script>
  <script src="./chat.js"></script>
</body>
</html>
