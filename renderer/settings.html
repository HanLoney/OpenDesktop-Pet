<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>设置 - OpenDesktopPet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --fs: 13px;
      --bar: 28px;
      --theme: #5B8CFF;
      --theme2: #5B8CFF;
      --theme-gradient: linear-gradient(135deg, #5B8CFF, #5B8CFF);
      --theme-light: #AFCBFF;
      --theme-bg: #EAF2FF;
      --theme-dark: #3a6ee8;
      --theme-shadow: rgba(91,140,255,0.4);
      --theme-shadow-soft: rgba(91,140,255,0.18);
    }
    html, body {
      width: 100%; height: 100%;
      background: #ffffff;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      font-size: var(--fs);
      color: #333;
    }

    /* ─── 顶部标题栏（可拖动） ─── */
    #title-bar {
      -webkit-app-region: drag;
      height: 38px;
      background: var(--theme-gradient);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 0 14px;
      user-select: none;
      flex-shrink: 0;
    }
    #title-bar span {
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    #title-bar-close {
      -webkit-app-region: no-drag;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    #title-bar-close:hover { background: rgba(255,80,80,0.75); }

    /* ─── 主体内容 ─── */
    #settings-panel {
      height: calc(100vh - 38px);
      overflow-y: auto;
      padding: 16px 20px 100px;
      scrollbar-width: thin;
      scrollbar-color: var(--theme-light) transparent;
    }
    #settings-panel::-webkit-scrollbar { width: 5px; }
    #settings-panel::-webkit-scrollbar-thumb {
      background: var(--theme-light); border-radius: 3px;
    }

    .settings-section { margin-bottom: 1.2em; }
    .settings-section h3 {
      color: var(--theme); font-size: var(--fs);
      margin-bottom: 0.6em;
      padding-bottom: 4px;
      border-bottom: 1.5px solid var(--theme-light);
    }

    .field { margin-bottom: 0.55em; }
    .field label {
      display: block; color: #7a8aa8;
      font-size: calc(var(--fs) - 2px); margin-bottom: 0.2em;
    }
    .field input, .field textarea, .field select {
      width: 100%; padding: 0.4em 0.6em;
      border: 2px solid var(--theme-light);
      border-radius: 6px; background: #ffffff; color: #333;
      font-size: calc(var(--fs) - 1px); outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .field input::placeholder, .field textarea::placeholder { color: #9bb6dc; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--theme); }
    .field textarea { resize: vertical; min-height: 50px; }
    .field select { cursor: pointer; }

    .field-row { display: flex; gap: 0.5em; }
    .field-row .field { flex: 1; }

    .range-field { display: flex; align-items: center; gap: 0.5em; }
    .range-field input[type="range"] {
      flex: 1; accent-color: var(--theme); background: transparent;
      border: none; padding: 0; -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 2px; outline: none; cursor: pointer;
    }
    .range-field input[type="range"]::-webkit-slider-runnable-track {
      height: 4px; border-radius: 2px; background: var(--theme-light);
    }
    .range-field input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--theme); margin-top: -5px;
      box-shadow: 0 1px 4px var(--theme-shadow-soft);
      transition: background 0.15s, transform 0.1s;
    }
    .range-field input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
    .range-field input[type="range"]::-moz-range-track {
      height: 4px; border-radius: 2px; background: var(--theme-light); border: none;
    }
    .range-field input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--theme); border: none;
      box-shadow: 0 1px 4px var(--theme-shadow-soft);
    }
    .range-field .range-val {
      color: var(--theme); font-size: calc(var(--fs) - 1px);
      min-width: 30px; text-align: right;
    }

    /* ─── 底部操作栏（fixed） ─── */
    #bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 1.5px solid var(--theme-light);
      padding: 10px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }
    #save-settings-btn {
      width: 100%; padding: 0.5em; border: none; border-radius: 8px;
      background: var(--theme-gradient); color: #fff;
      font-size: var(--fs); cursor: pointer;
      transition: opacity 0.2s;
    }
    #save-settings-btn:hover { opacity: 0.85; }
    #quit-app-btn {
      width: 100%; padding: 0.5em;
      border: 1.5px solid #ffb3b3; border-radius: 8px;
      background: transparent; color: #e05555;
      font-size: var(--fs); cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #quit-app-btn:hover { background: #fff0f0; }
    .save-status {
      text-align: center; color: #3aa76d;
      font-size: calc(var(--fs) - 2px); min-height: 16px;
    }

    .theme-mode-btn {
      padding: 2px 10px; font-size: calc(var(--fs) - 1px);
      border: 1.5px solid var(--theme-light); border-radius: 20px;
      background: transparent; color: #7a8aa8; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .theme-mode-btn.active {
      background: var(--theme-gradient); color: #fff; border-color: transparent;
    }
    .theme-mode-btn:not(.active):hover { border-color: var(--theme); color: var(--theme); }

    .theme-preset-swatch {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: transform 0.1s, border-color 0.15s; flex-shrink: 0;
    }
    .theme-preset-swatch:hover { transform: scale(1.18); }
    .theme-preset-swatch.active { border-color: #333 !important; transform: scale(1.12); }

    /* ─── 自定义确认弹窗 ─── */
    #custom-confirm-mask {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.18);
      z-index: 999; display: none;
      align-items: center; justify-content: center;
      backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    }
    #custom-confirm-mask.visible { display: flex; }
    #custom-confirm-box {
      background: #fff; border: 2px solid var(--theme-light);
      border-radius: 18px; box-shadow: 0 8px 32px var(--theme-shadow-soft);
      padding: 24px 24px 18px; min-width: 220px; max-width: 280px;
      display: flex; flex-direction: column; gap: 16px;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    }
    #custom-confirm-msg { color: #333; font-size: var(--fs); line-height: 1.6; text-align: center; }
    #custom-confirm-btns { display: flex; gap: 10px; justify-content: center; }
    #custom-confirm-btns button {
      flex: 1; padding: 7px 0; border-radius: 10px;
      border: 2px solid var(--theme-light); font-size: var(--fs);
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    #custom-confirm-ok { background: var(--theme-gradient); color: #fff; border-color: var(--theme) !important; }
    #custom-confirm-ok:hover { opacity: 0.85; }
    #custom-confirm-cancel { background: #fff; color: var(--theme); }
    #custom-confirm-cancel:hover { background: var(--theme-bg); border-color: var(--theme) !important; }

    /* ─── 新建角色弹窗 ─── */
    #profile-create-mask {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 1000; display: none;
      align-items: center; justify-content: center;
      backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    }
    #profile-create-mask.visible { display: flex; }
    #profile-create-box {
      background: #fff; border: 2px solid var(--theme-light);
      border-radius: 18px; box-shadow: 0 8px 32px var(--theme-shadow-soft);
      padding: 20px 22px 16px; width: 340px; max-height: 80vh;
      overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--theme-light) transparent;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    }
    #profile-create-box::-webkit-scrollbar { width: 4px; }
    #profile-create-box::-webkit-scrollbar-thumb { background: var(--theme-light); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- 顶部拖动标题栏 -->
  <div id="title-bar">
    <span>设置</span>
    <button id="title-bar-close" title="关闭">✕</button>
  </div>

  <!-- 设置内容 -->
  <div id="settings-panel">

    <div class="settings-section">
      <h3>角色配置</h3>
      <div class="field">
        <label>当前角色</label>
        <select id="cfg-profile-select" style="width:100%;"></select>
      </div>
      <div class="field-row" style="gap:8px;margin-top:6px;">
        <button id="profile-new-btn" style="flex:1;padding:5px;border:2px solid var(--theme-light);border-radius:8px;background:#ffffff;color:var(--theme);font-size:calc(var(--fs) - 1px);cursor:pointer;">新建角色</button>
        <button id="profile-delete-btn" style="flex:1;padding:5px;border:2px solid #ffb3b3;border-radius:8px;background:#ffffff;color:#e05555;font-size:calc(var(--fs) - 1px);cursor:pointer;">删除角色</button>
      </div>
      <div class="save-status" id="profile-status"></div>
    </div>

    <div class="settings-section">
      <h3>LLM 大模型</h3>
      <div class="field"><label>API Base URL</label><input type="text" id="cfg-llm-api-base"></div>
      <div class="field"><label>API Key</label><input type="password" id="cfg-llm-api-key"></div>
      <div class="field-row">
        <div class="field"><label>模型名称</label><input type="text" id="cfg-llm-model"></div>
        <div class="field">
          <label>温度</label>
          <div class="range-field">
            <input type="range" id="cfg-llm-temperature" min="0" max="2" step="0.05">
            <span class="range-val" id="cfg-llm-temperature-val">0.8</span>
          </div>
        </div>
      </div>
      <div class="field"><label>系统提示词</label><textarea id="cfg-llm-system-prompt" rows="3"></textarea></div>
    </div>

    <div class="settings-section">
      <h3>主动交互</h3>
      <div class="field">
        <label style="display:flex;align-items:center;gap:6px;">
          <input type="checkbox" id="cfg-proactive-enabled" style="width:auto;">
          启用定时屏幕识别
        </label>
      </div>
      <div id="proactive-sub" style="padding-left:14px;border-left:2px solid var(--theme-light);margin-left:4px;">
        <div class="field">
          <label>触发间隔（秒）</label>
          <div style="display:flex;align-items:center;gap:6px;">
            <input type="number" id="cfg-proactive-interval-min" min="10" max="86400" value="60" style="flex:1;" placeholder="最小">
            <span style="color:#7a8aa8;font-size:calc(var(--fs) - 1px);">~</span>
            <input type="number" id="cfg-proactive-interval-max" min="10" max="86400" value="60" style="flex:1;" placeholder="最大">
          </div>
          <div style="color:#aab4c8;font-size:calc(var(--fs) - 2px);margin-top:2px;">两值相同则固定间隔，不同则随机触发</div>
        </div>
        <div class="field">
          <label>决策提示词</label>
          <textarea id="cfg-proactive-decision-prompt" rows="3"></textarea>
        </div>
        <div class="field">
          <label>主动交互提示词</label>
          <textarea id="cfg-proactive-system-prompt" rows="4"></textarea>
        </div>
      </div>
      <div class="field" style="margin-top:8px;">
        <label style="display:flex;align-items:center;gap:6px;">
          <input type="checkbox" id="cfg-chat-screenshot" style="width:auto;">
          对话时自动附带截屏
        </label>
      </div>
      <div class="field-row" style="gap:8px;margin-top:10px;">
        <button id="prompt-export-btn" style="flex:1;padding:5px;border:2px solid var(--theme-light);border-radius:8px;background:#ffffff;color:var(--theme);font-size:calc(var(--fs) - 1px);cursor:pointer;">导出提示词</button>
        <button id="prompt-import-btn" style="flex:1;padding:5px;border:2px solid var(--theme-light);border-radius:8px;background:#ffffff;color:var(--theme);font-size:calc(var(--fs) - 1px);cursor:pointer;">导入提示词</button>
      </div>
      <div class="save-status" id="prompt-io-status"></div>
    </div>

    <div class="settings-section">
      <h3>显示</h3>
      <div class="field">
        <label>主题色</label>
        <div style="display:flex;align-items:center;gap:6px;margin-top:4px;margin-bottom:6px;">
          <button id="theme-mode-solid" class="theme-mode-btn active" data-mode="solid">单色</button>
          <button id="theme-mode-gradient" class="theme-mode-btn" data-mode="gradient">渐变色</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <div id="theme-presets" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;">
          <label style="display:flex;align-items:center;gap:4px;margin-bottom:0;color:#7a8aa8;font-size:calc(var(--fs) - 2px);">
            <span id="theme-color1-label">颜色</span>
            <input type="color" id="cfg-ui-theme-color" style="width:28px;height:24px;border:2px solid var(--theme-light);border-radius:6px;padding:2px;cursor:pointer;background:transparent;">
          </label>
          <label id="theme-color2-row" style="display:none;align-items:center;gap:4px;margin-bottom:0;color:#7a8aa8;font-size:calc(var(--fs) - 2px);">
            终止色
            <input type="color" id="cfg-ui-theme-color2" style="width:28px;height:24px;border:2px solid var(--theme-light);border-radius:6px;padding:2px;cursor:pointer;background:transparent;">
          </label>
          <div id="theme-gradient-preview" style="display:none;flex:1;min-width:40px;height:24px;border-radius:6px;border:2px solid var(--theme-light);"></div>
        </div>
        <input type="hidden" id="cfg-ui-theme-color-mode" value="solid">
      </div>
      <div class="field">
        <label>字体大小</label>
        <div class="range-field">
          <input type="range" id="cfg-ui-font-size" min="8" max="20" step="1">
          <span class="range-val" id="cfg-ui-font-size-val">13</span>
        </div>
      </div>
      <div class="field">
        <label>底部栏大小</label>
        <div class="range-field">
          <input type="range" id="cfg-ui-bar-size" min="20" max="40" step="1">
          <span class="range-val" id="cfg-ui-bar-size-val">28</span>
        </div>
      </div>
      <div class="field">
        <label style="display:flex;align-items:center;gap:6px;">
          <input type="checkbox" id="cfg-ui-show-bubble" style="width:auto;" checked>
          显示聊天气泡
        </label>
      </div>
    </div>

    <div class="settings-section">
      <h3>角色形象</h3>
      <div class="field" style="font-size:calc(var(--fs) - 1px);color:#7a8aa8;padding:2px 0 4px;">
        默认使用 Live2D 模型。上传自定义图片后将替换为静态图片形象。
      </div>
      <div id="custom-image-preview-wrap" style="display:none;margin-bottom:8px;text-align:center;">
        <img id="custom-image-preview" src="" alt="预览"
          style="max-width:100%;max-height:120px;border-radius:10px;border:2px solid var(--theme-light);object-fit:contain;">
        <div id="custom-image-name" style="font-size:calc(var(--fs) - 1px);color:#7a8aa8;margin-top:4px;word-break:break-all;"></div>
      </div>
      <div class="field-row" style="gap:8px;">
        <button id="custom-image-choose-btn" style="flex:1;padding:6px;border:2px solid var(--theme-light);border-radius:8px;background:#ffffff;color:var(--theme);font-size:var(--fs);cursor:pointer;">上传图片</button>
        <button id="custom-image-clear-btn" style="flex:1;padding:6px;border:2px solid #ffb3b3;border-radius:8px;background:#ffffff;color:#e05555;font-size:var(--fs);cursor:pointer;">恢复 Live2D</button>
      </div>
      <div class="save-status" id="custom-image-status"></div>
    </div>

    <div class="settings-section">
      <h3>TTS 语音合成</h3>
      <div class="field">
        <label style="display:flex;align-items:center;gap:6px;">
          <input type="checkbox" id="cfg-tts-enabled" style="width:auto;">
          启用语音合成
        </label>
      </div>
      <div id="tts-sub" style="padding-left:14px;border-left:2px solid var(--theme-light);margin-left:4px;">
        <div class="field">
          <label>TTS 服务商</label>
          <select id="cfg-tts-provider">
            <option value="volcengine">火山引擎（字节跳动）</option>
            <option value="openai">OpenAI TTS / 兼容接口</option>
            <option value="edge">Edge TTS（微软免费）</option>
            <option value="cosyvoice">CosyVoice / 本地 HTTP</option>
          </select>
        </div>
        <div id="tts-panel-volcengine">
          <div class="field-row">
            <div class="field"><label>App ID</label><input type="text" id="cfg-tts-app-id"></div>
            <div class="field"><label>Access Token</label><input type="password" id="cfg-tts-access-token"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>音色 Voice Type</label><input type="text" id="cfg-tts-voice-type"></div>
            <div class="field"><label>Resource ID</label><input type="text" id="cfg-tts-resource-id"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>采样率</label><input type="number" id="cfg-tts-sample-rate"></div>
            <div class="field">
              <label>语速</label>
              <div class="range-field">
                <input type="range" id="cfg-tts-speech-rate" min="-50" max="50" step="1">
                <span class="range-val" id="cfg-tts-speech-rate-val">13</span>
              </div>
            </div>
          </div>
        </div>
        <div id="tts-panel-openai" style="display:none;">
          <div class="field"><label>API Base（留空用官方）</label><input type="text" id="cfg-tts-openai-api-base" placeholder="https://api.openai.com"></div>
          <div class="field-row">
            <div class="field"><label>API Key</label><input type="password" id="cfg-tts-openai-api-key"></div>
            <div class="field"><label>模型</label><input type="text" id="cfg-tts-openai-model" placeholder="tts-1"></div>
          </div>
          <div class="field-row">
            <div class="field">
              <label>Voice</label>
              <select id="cfg-tts-openai-voice">
                <option value="alloy">alloy</option><option value="echo">echo</option>
                <option value="fable">fable</option><option value="onyx">onyx</option>
                <option value="nova">nova</option><option value="shimmer">shimmer</option>
              </select>
            </div>
            <div class="field">
              <label>语速 Speed</label>
              <div class="range-field">
                <input type="range" id="cfg-tts-openai-speed" min="0.25" max="4.0" step="0.05">
                <span class="range-val" id="cfg-tts-openai-speed-val">1.0</span>
              </div>
            </div>
          </div>
        </div>
        <div id="tts-panel-edge" style="display:none;">
          <div class="field" style="color:#3aa76d;font-size:calc(var(--fs) - 1px);padding:3px 0;">
            免费，无需 API Key。需系统已安装 edge-tts（<code>pip install edge-tts</code>）
          </div>
          <div class="field-row">
            <div class="field"><label>Voice</label><input type="text" id="cfg-tts-edge-voice" placeholder="zh-CN-XiaoxiaoNeural"></div>
            <div class="field"><label>语速 Rate</label><input type="text" id="cfg-tts-edge-rate" placeholder="+0%"></div>
          </div>
          <div class="field"><label>音量 Volume</label><input type="text" id="cfg-tts-edge-volume" placeholder="+0%"></div>
        </div>
        <div id="tts-panel-cosyvoice" style="display:none;">
          <div class="field"><label>API Base（本地服务地址）</label><input type="text" id="cfg-tts-cosyvoice-api-base" placeholder="http://127.0.0.1:50000"></div>
          <div class="field-row">
            <div class="field"><label>Endpoint</label><input type="text" id="cfg-tts-cosyvoice-endpoint" placeholder="/inference_sft"></div>
            <div class="field"><label>Speaker ID</label><input type="text" id="cfg-tts-cosyvoice-spk-id" placeholder="default"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="settings-section" id="camera-section">
      <h3>摄像头</h3>
      <div class="field">
        <label style="display:flex;align-items:center;gap:6px;">
          <input type="checkbox" id="cfg-camera-enabled" style="width:auto;">
          启用摄像头
        </label>
      </div>
      <div id="camera-sub" style="display:none;padding-left:14px;border-left:2px solid var(--theme-light);margin-left:4px;">
        <div class="field">
          <label style="display:flex;align-items:center;gap:6px;">
            <input type="checkbox" id="cfg-camera-on-proactive" style="width:auto;" checked>
            主动交互时附带摄像头画面
          </label>
        </div>
        <div class="field">
          <label style="display:flex;align-items:center;gap:6px;">
            <input type="checkbox" id="cfg-camera-on-chat" style="width:auto;">
            用户发送消息时附带摄像头画面
          </label>
        </div>
        <div class="field">
          <label>摄像头设备</label>
          <div style="display:flex;gap:6px;align-items:center;">
            <select id="cfg-camera-device" style="flex:1;"></select>
            <button id="camera-refresh-btn" style="padding:4px 10px;border:2px solid var(--theme-light);border-radius:6px;background:#fff;color:var(--theme);font-size:calc(var(--fs) - 1px);cursor:pointer;white-space:nowrap;">刷新</button>
          </div>
        </div>
        <div class="field">
          <label>预览</label>
          <div style="position:relative;background:#111;border-radius:8px;overflow:hidden;border:2px solid var(--theme-light);aspect-ratio:4/3;max-height:180px;">
            <video id="camera-preview" autoplay playsinline muted
              style="width:100%;height:100%;object-fit:cover;display:block;"></video>
            <div id="camera-preview-tip"
              style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#888;font-size:calc(var(--fs) - 1px);background:#111;pointer-events:none;">
              未开启预览
            </div>
          </div>
        </div>
        <div class="save-status" id="camera-status"></div>
      </div>
    </div>

    <div class="settings-section" id="memory-section">
      <h3>记忆管理</h3>
      <div class="field">
        <label>上下文轮数（同时触发摘要压缩阈值）</label>
        <input id="cfg-memory-context-rounds" type="number" min="2" max="50" value="10" style="width:80px;">
      </div>
      <div class="field">
        <label>总对话轮次 / 待压缩条数</label>
        <div id="memory-stats" style="color:#7a8aa8;font-size:calc(var(--fs) - 1px);padding:3px 0;">加载中...</div>
      </div>
      <div class="field">
        <label>长期记忆摘要</label>
        <textarea id="memory-summary-view" rows="3" readonly style="background:#f7f9ff;color:#555;resize:none;"></textarea>
      </div>
      <div class="field">
        <label>结构化事实</label>
        <div id="memory-facts-view" style="font-size:calc(var(--fs) - 1px);color:#555;max-height:80px;overflow-y:auto;border:2px solid var(--theme-light);border-radius:6px;padding:4px 8px;background:#f7f9ff;line-height:1.8;"></div>
      </div>
      <div class="field-row" style="gap:8px;margin-top:4px;">
        <button id="memory-export-btn" style="flex:1;padding:6px;border:2px solid var(--theme-light);border-radius:8px;background:#ffffff;color:var(--theme);font-size:var(--fs);cursor:pointer;">导出记忆</button>
        <button id="memory-import-btn" style="flex:1;padding:6px;border:2px solid var(--theme-light);border-radius:8px;background:#ffffff;color:var(--theme);font-size:var(--fs);cursor:pointer;">导入记忆</button>
        <button id="memory-clear-btn" style="flex:1;padding:6px;border:2px solid #ffb3b3;border-radius:8px;background:#ffffff;color:#e05555;font-size:var(--fs);cursor:pointer;">清空记忆</button>
      </div>
      <div id="memory-clear-confirm" style="display:none;margin-top:6px;padding:8px 10px;border:2px solid #ffb3b3;border-radius:8px;background:#fff5f5;font-size:calc(var(--fs) - 1px);color:#e05555;">
        确定要清空全部记忆吗？此操作不可恢复。
        <div style="display:flex;gap:8px;margin-top:6px;">
          <button id="memory-clear-ok" style="flex:1;padding:4px;border:2px solid #e05555;border-radius:6px;background:#e05555;color:#fff;font-size:calc(var(--fs) - 1px);cursor:pointer;">确定清空</button>
          <button id="memory-clear-cancel" style="flex:1;padding:4px;border:2px solid #ccc;border-radius:6px;background:#fff;color:#888;font-size:calc(var(--fs) - 1px);cursor:pointer;">取消</button>
        </div>
      </div>
      <div class="save-status" id="memory-status"></div>
    </div>

  </div><!-- /settings-panel -->

  <!-- 底部固定操作栏 -->
  <div id="bottom-bar">
    <button id="save-settings-btn">保存设置</button>
    <div class="save-status" id="save-status"></div>
    <button id="quit-app-btn">退出应用</button>
  </div>

  <!-- 自定义确认弹窗 -->
  <div id="custom-confirm-mask">
    <div id="custom-confirm-box">
      <div id="custom-confirm-msg"></div>
      <input type="text" id="custom-confirm-input" placeholder="" style="display:none;width:100%;padding:0.4em 0.6em;border:2px solid var(--theme-light);border-radius:6px;font-size:var(--fs);outline:none;margin-top:4px;">
      <div id="custom-confirm-btns">
        <button id="custom-confirm-cancel">取消</button>
        <button id="custom-confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <!-- 新建角色弹窗 -->
  <div id="profile-create-mask">
    <div id="profile-create-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <span style="font-size:15px;font-weight:bold;color:var(--theme);">新建角色</span>
        <button id="profile-create-close" style="width:24px;height:24px;border-radius:50%;border:none;background:rgba(0,0,0,0.06);color:#999;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
      </div>
      <div class="field">
        <label>角色名称</label>
        <input type="text" id="profile-create-name" placeholder="例如：小猫咪">
      </div>
      <div class="field">
        <label>系统提示词</label>
        <textarea id="profile-create-system-prompt" rows="4" placeholder="角色的系统提示词..."></textarea>
      </div>
      <div class="field">
        <label>决策提示词</label>
        <textarea id="profile-create-decision-prompt" rows="3" placeholder="主动交互的决策提示词（可选）"></textarea>
      </div>
      <div class="field">
        <label>主动交互提示词</label>
        <textarea id="profile-create-proactive-prompt" rows="3" placeholder="主动交互系统提示词（可选）"></textarea>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
        <button id="profile-create-import-btn" style="padding:4px 14px;border:2px solid var(--theme-light);border-radius:6px;background:#fff;color:var(--theme);font-size:calc(var(--fs) - 1px);cursor:pointer;">导入提示词</button>
      </div>
      <div class="field">
        <label>角色图片（可选）</label>
        <div id="profile-create-image-preview-wrap" style="display:none;margin-bottom:8px;text-align:center;">
          <img id="profile-create-image-preview" src="" alt="预览"
            style="max-width:100%;max-height:100px;border-radius:8px;border:2px solid var(--theme-light);object-fit:contain;">
        </div>
        <div style="display:flex;gap:8px;">
          <button id="profile-create-image-btn" style="flex:1;padding:5px;border:2px solid var(--theme-light);border-radius:8px;background:#fff;color:var(--theme);font-size:calc(var(--fs) - 1px);cursor:pointer;">上传图片</button>
          <button id="profile-create-image-clear-btn" style="flex:1;padding:5px;border:2px solid #ffb3b3;border-radius:8px;background:#fff;color:#e05555;font-size:calc(var(--fs) - 1px);cursor:pointer;display:none;">移除图片</button>
        </div>
      </div>
      <div class="save-status" id="profile-create-status" style="margin-bottom:6px;"></div>
      <button id="profile-create-save-btn" style="width:100%;padding:8px;border:none;border-radius:8px;background:var(--theme-gradient);color:#fff;font-size:var(--fs);cursor:pointer;">保存角色</button>
    </div>
  </div>

  <script src="./settings.js"></script>
</body>
</html>
